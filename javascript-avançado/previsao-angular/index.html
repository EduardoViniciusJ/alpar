<!DOCTYPE html>
<html lang="pt-br" ng-app="app">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsao Angular</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100" ng-controller="PrevisaoController">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">Previsao Angular</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="../../../index.html">Voltar</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-4">
        <div class="row justify-content-center w-100">
            <div class="col-12 col-md-8 col-lg-5">
                <section class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 fw-bold text-center mb-4">Buscar temperatura</h1>

                        <form ng-submit="buscarClima()" class="d-flex flex-column gap-3">
                            <div>
                                <label for="cidade" class="form-label">Cidade</label>
                                <input
                                    id="cidade"
                                    type="text"
                                    class="form-control"
                                    placeholder="Digite o nome da cidade"
                                    ng-model="cidade"
                                    required>
                            </div>

                            <button type="submit" class="btn btn-dark w-100" ng-disabled="carregando">
                                {{ carregando ? 'Buscando...' : 'Buscar temperatura' }}
                            </button>
                        </form>

                        <div class="alert alert-danger mt-4 mb-0" ng-if="erro">
                            {{ erro }}
                        </div>

                        <div class="card bg-light border-0 mt-4" ng-if="temperatura !== null">
                            <div class="card-body text-center">
                                <p class="text-muted mb-2">Cidade pesquisada</p>
                                <h2 class="h4 mb-3">{{ nomeCidade }}</h2>
                                <p class="text-muted mb-2">Temperatura atual</p>
                                <p class="display-6 fw-bold mb-0">{{ temperatura | number:1 }} &deg;C</p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class="bg-white text-dark py-1 border-top text-muted shadow-sm">
        <p class="m-3 small">
            &copy; 2026 <strong>Eduardo Vinicius</strong>
        </p>
    </footer>

    <script src="./assets/js/services/previsao.service.js"></script>
    <script src="./assets/js/controllers/previsao.controller.js"></script>
</body>
</html>
