<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automação de Luzes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">Automação de Luzes</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="../../../index.html">Voltar</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-4 flex-grow-1 d-flex align-items-center justify-content-center">
        <section class="row justify-content-center g-4 w-100">
            <div class="col-12">
                <div class="d-flex flex-column flex-lg-row justify-content-center align-items-center gap-4">
                    <div class="room-group d-flex flex-column align-items-center gap-3">
                        <div id="quarto" class="room-box">Quarto</div>
                        <div class="controls">
                            <button data-comodo="quarto" data-acao="ligar">Ligar</button>
                            <button data-comodo="quarto" data-acao="desligar">Desligar</button>
                        </div>
                    </div>

                    <div class="room-group d-flex flex-column align-items-center gap-3">
                        <div id="sala" class="room-box">Sala</div>
                        <div class="controls">
                            <button data-comodo="sala" data-acao="ligar">Ligar</button>
                            <button data-comodo="sala" data-acao="desligar">Desligar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 text-center">
                <p id="status-display" class="mb-0"></p>
            </div>
        </section>
    </main>

    <footer class="bg-white text-dark py-1 border-top text-muted shadow-sm">
        <p class="m-3 small">
            &copy; 2026 <strong>Eduardo Vinicius</strong>
        </p>
        </div>
    </footer>
    <script src="./assets/js/services/lightcenter.service.js"></script>
    <script src="./assets/js/controllers/lightcenter.controller.js"></script>
</body>
</html>
