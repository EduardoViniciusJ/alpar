<!DOCTYPE html>
<html lang="pt-br" ng-app="app">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoFlow</title>
    <link rel="icon" href="./assets/icons/icon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100 content-fade-in" ng-controller="AccountController">

    <header class="shadow-sm">
        <nav class="navbar navbar-expand-lg bg-white border-bottom border-primary border-opacity-25">
            <div class="container px-3 px-md-4">
                <a class="navbar-brand d-flex align-items-center gap-2" href="./index.html">
                    <img src="./assets/icons/icon.png" alt="" class="rounded object-fit-contain" width="24" height="24">
                    <span class="fw-bold">TodoFlow</span>
                </a>
            </div>
        </nav>
    </header>

    <main class="flex-fill d-flex flex-column py-5 py-lg-5">
        <section ng-if="!account.isAuthenticated" class="container px-3 px-md-4 flex-grow-1 d-flex flex-column justify-content-center">
            <div class="row justify-content-center">
            <div class="col-12 col-md-9 col-lg-6 col-xl-5">
                <div class="card shadow border-0 border-primary border-opacity-25 rounded-3">
                    <div class="card-header bg-primary bg-opacity-10 border-bottom border-primary border-opacity-50 py-4 text-center">
                        <img src="./assets/icons/icon.png" alt="" class="mb-2 object-fit-contain" width="48" height="48">
                        <h1 class="h4 mb-1 fw-bold">TodoFlow</h1>
                        <p class="text-secondary mb-0" ng-if="auth.mode === 'login'">Entre com seu e-mail e senha</p>
                        <p class="text-secondary mb-0" ng-if="auth.mode === 'register'">Crie sua conta para começar</p>
                        <p class="text-secondary mb-0" ng-if="auth.mode === 'reset'">Redefina sua senha</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="alert mb-3" ng-if="auth.feedback.message" ng-class="auth.feedback.success ? 'alert-success' : 'alert-danger'">
                            {{ auth.feedback.message }}
                        </div>

                        <div ng-if="auth.mode === 'login'">
                            <form ng-submit="login()" class="auth-form">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold" for="loginEmail">E-mail</label>
                                    <input id="loginEmail" type="text" class="form-control rounded-0" ng-model="auth.login.email" autocomplete="username" placeholder="Digite seu e-mail">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-semibold" for="loginPassword">Senha</label>
                                    <input id="loginPassword" type="password" class="form-control rounded-0" ng-model="auth.login.password" autocomplete="current-password" placeholder="Digite sua senha">
                                </div>
                                <button class="btn btn-primary rounded-0 w-100 py-2 fw-semibold" type="submit">Entrar</button>
                            </form>
                            <div class="text-center mt-3">
                                <button type="button" class="btn btn-link rounded-0 text-decoration-none p-0 small" ng-click="setAuthMode('reset')">Esqueci minha senha</button>
                            </div>
                            <p class="text-center text-secondary small mb-0 mt-4 pt-3 border-top">
                                Não tem uma conta?
                                <button type="button" class="btn btn-link btn-sm rounded-0 text-decoration-none p-0 align-baseline fw-semibold" ng-click="setAuthMode('register')">Cadastre-se</button>
                            </p>
                        </div>

                        <div ng-if="auth.mode === 'register'">
                            <form ng-submit="register()" class="auth-form">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold" for="regUsername">Nome de usuário</label>
                                    <input id="regUsername" type="text" class="form-control rounded-0" ng-model="auth.register.username" placeholder="Digite seu nome de usuário" autocomplete="username">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold" for="regEmail">E-mail</label>
                                    <input id="regEmail" type="text" class="form-control rounded-0" ng-model="auth.register.email" placeholder="Digite seu e-mail" autocomplete="email">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-semibold" for="regPassword">Senha</label>
                                    <input id="regPassword" type="password" class="form-control rounded-0" ng-model="auth.register.password" placeholder="Digite sua senha" autocomplete="new-password">
                                </div>
                                <button class="btn btn-primary rounded-0 w-100 py-2 fw-semibold" type="submit">Criar conta</button>
                            </form>
                            <p class="text-center small mb-0 mt-4 pt-3 border-top">
                                <button type="button" class="btn btn-link rounded-0 text-decoration-none p-0" ng-click="setAuthMode('login')">← Voltar ao login</button>
                            </p>
                        </div>

                        <div ng-if="auth.mode === 'reset'">
                            <p class="text-secondary small mb-3">Informe o e-mail da sua conta e a nova senha desejada.</p>
                            <form ng-submit="resetPassword()" class="auth-form">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold" for="resetEmail">E-mail</label>
                                    <input id="resetEmail" type="text" class="form-control rounded-0" ng-model="auth.reset.email" autocomplete="email" placeholder="Digite o e-mail da sua conta">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-semibold" for="resetNewPassword">Nova senha</label>
                                    <input id="resetNewPassword" type="password" class="form-control rounded-0" ng-model="auth.reset.newPassword" autocomplete="new-password" placeholder="Digite sua nova senha">
                                </div>
                                <button class="btn btn-primary rounded-0 w-100 py-2 fw-semibold" type="submit">Salvar nova senha</button>
                            </form>
                            <p class="text-center small mb-0 mt-4 pt-3 border-top">
                                <button type="button" class="btn btn-link rounded-0 text-decoration-none p-0" ng-click="setAuthMode('login')">← Voltar ao login</button>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </section>
    </main>

    <footer class="border-top py-1 border-primary border-opacity-25 bg-white mt-auto shadow-sm">
        <div class="container text-center">
            <div class="mb-0">
                <a href="https://github.com/EduardoViniciusJ/alpar" class="text-dark fs-4" target="_blank"
                    title="Ver repositório">
                    <i class="bi bi-github"></i>
                </a>
            </div>
            <p class="mb-0 small">
                &copy; 2026 <strong>TodoFlow</strong>
            </p>
        </div>
    </footer>

    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/models/user.model.js"></script>
    <script src="./assets/js/services/mood.service.js"></script>
    <script src="./assets/js/models/habit.model.js"></script>
    <script src="./assets/js/models/daily-record.model.js"></script>
    <script src="./assets/js/services/auth.service.js"></script>
    <script src="./assets/js/services/habit.service.js"></script>
    <script src="./assets/js/services/daily-record.service.js"></script>
    <script src="./assets/js/controllers/account.controller.js"></script>
    <script src="./assets/js/controllers/habit.controller.js"></script>
    <script src="./assets/js/controllers/daily-record.controller.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
